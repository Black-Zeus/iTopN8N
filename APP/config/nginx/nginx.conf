worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;
    proxy_read_timeout 300;
    proxy_connect_timeout 60;
    client_max_body_size 50M;

    # Manejo correcto de upgrade WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams
    upstream n8n_up     { server n8n:5678; }
    upstream nocodb_up  { server nocodb:8080; }
    upstream mailpit_up { server mailpit:8025; }

    server {
        listen 80;
        server_name _;

        # ── Página de inicio ────────────────────────────────────────────────
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }
        location = /index.html {
            root /usr/share/nginx/html;
        }
        location = /favicon.ico {
            root /usr/share/nginx/html;
            log_not_found off;
            access_log    off;
        }

        # ── n8n ─────────────────────────────────────────────────────────────
        # n8n sirve su app en /n8n/ PERO sus assets estáticos en / (sin prefijo).
        # La SPA los referencia con /n8n/, por eso hay que hacer strip del
        # prefijo solo para /assets/ y /static/ antes de enviar a n8n.
        location = /n8n { return 301 $scheme://$http_host/n8n/; }
        location ~ ^/n8n/n8n/(.*)$ { return 301 $scheme://$http_host/n8n/$1$is_args$args; }

        location /n8n/assets/ {
            rewrite ^/n8n/(.*)$ /$1 break;
            proxy_pass         http://n8n_up;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /n8n/static/base-path.js {
            rewrite ^/n8n/(.*)$ /$1 break;
            proxy_pass         http://n8n_up;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Accept-Encoding   "";
            add_header         Cache-Control     "no-store";
            sub_filter_once    on;
            sub_filter_types   text/javascript application/javascript;
            sub_filter "window.BASE_PATH = '/n8n/';" "window.BASE_PATH = '/n8n/';(function(){function p(v){var b='/n8n/n8n/';while(v.indexOf(b)===0)v='/n8n/'+v.slice(b.length);return v==='/n8n/n8n'?'/n8n/':v}function n(u){try{var x=new URL(u,location.origin);x.pathname=p(x.pathname);return x.origin===location.origin?x.pathname+x.search+x.hash:u}catch(e){return typeof u==='string'?p(u):u}}if(location.pathname.indexOf('/n8n/n8n/')===0||location.pathname==='/n8n/n8n'){history.replaceState(history.state,'',n(location.href))}['pushState','replaceState'].forEach(function(k){var o=history[k];history[k]=function(s,t,u){return o.call(this,s,t,u?n(u):u)}})})();";
        }

        location /n8n/static/ {
            rewrite ^/n8n/(.*)$ /$1 break;
            proxy_pass         http://n8n_up;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # App, REST API, webhooks y WebSocket: strip de prefijo (n8n sirve todo en / internamente)
        location /n8n/ {
            rewrite ^/n8n/(.*)$ /$1 break;
            proxy_pass         http://n8n_up;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   Origin            $scheme://$host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache_bypass $http_upgrade;
            proxy_intercept_errors on;
            error_page 404 = @n8n_spa;
        }

        location @n8n_spa {
            if ($http_accept !~* "text/html") {
                return 404;
            }

            rewrite ^ / break;
            proxy_pass         http://n8n_up;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   Origin            $scheme://$host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache_bypass $http_upgrade;
        }

        # ── NocoDB ──────────────────────────────────────────────────────────
        # NocoDB no soporta subpath nativo: strip del prefijo + sub_filter para
        # reescribir URLs en HTML/JS. Las llamadas a la API van a /api/v1/...
        # que NocoDB resuelve desde su raíz.
        location = /nocodb { return 301 /nocodb/; }

        location /nocodb/ {
            rewrite ^/nocodb/(.*)$ /$1 break;

            proxy_pass         http://nocodb_up;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     / /nocodb/;
            proxy_cookie_path  / /nocodb/;

            # Deshabilitar compresión upstream para que sub_filter pueda reescribir el contenido
            proxy_set_header   Accept-Encoding "";
            sub_filter_once  off;
            sub_filter_types text/javascript application/javascript;
            # Reescribir baseURL del Vue Router (en HTML) para que SPA navegue bajo /nocodb/
            sub_filter 'baseURL:"/"'    'baseURL:"/nocodb/"';
            sub_filter "baseURL:'/'"   "baseURL:'/nocodb/'";
            sub_filter '/_nuxt/'  '/nocodb/_nuxt/';
            sub_filter '="/api/'  '="/nocodb/api/';
            sub_filter "='/api/"  "='/nocodb/api/";
            sub_filter 'href="/'  'href="/nocodb/';
            sub_filter "src='/"   "src='/nocodb/";
            sub_filter 'src="/'   'src="/nocodb/';
            sub_filter 'action="/' 'action="/nocodb/';
        }

        # Las llamadas a la API de NocoDB (/api/v1/...) se resuelven aquí:
        # la SPA hace fetch a /api/... relativo al origen (http://localhost).
        # nginx captura y reenvía a NocoDB sin modificar la URL.
        location /api/ {
            proxy_pass         http://nocodb_up;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Mailpit ─────────────────────────────────────────────────────────
        # Mailpit v1.29+ usa --webroot / MP_WEBROOT (no MP_ROOT_PATH).
        # Con MP_WEBROOT=/mailpit sirve todo desde ese prefijo.
        location = /mailpit { return 301 /mailpit/; }

        location /mailpit/ {
            proxy_pass         http://mailpit_up;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
