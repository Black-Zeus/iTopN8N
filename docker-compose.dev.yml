services:
  # PostgreSQL expuesto al host para acceso con clientes DB externos (DBeaver, etc.)
  # Excepción permitida: bases de datos.
  postgres:
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"

  # n8n, nocodb, mailpit y nginx: sin puertos al host.
  # Acceso exclusivo vía proxy nginx en /{app}
